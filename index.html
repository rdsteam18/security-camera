<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Security Motion Detector</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* custom pulse & smoothness */
    .pulse-red {
      animation: pulseBg 0.3s ease-in-out;
    }
    @keyframes pulseBg {
      0% { background-color: rgba(220, 38, 38, 0.3); }
      50% { background-color: rgba(220, 38, 38, 0.7); }
      100% { background-color: rgba(220, 38, 38, 0.3); }
    }
    .bar-threshold {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background-color: #ef4444;
      z-index: 10;
      transition: left 0.1s;
    }
    .gallery-scroll {
      scrollbar-width: thin;
      scrollbar-color: #4b5563 #1f2937;
    }
    .gallery-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .gallery-scroll::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 8px;
    }
    video {
      object-fit: cover;
      width: 100%;
      height: 100%;
      background: #111;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-3 font-sans antialiased">
  <div id="app" class="w-full max-w-md mx-auto space-y-4">
    
    <!-- header -->
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-semibold tracking-tight flex items-center gap-2">
        <span class="text-red-400">●</span> Shop Security
      </h1>
      <div class="flex gap-2 text-sm bg-gray-800 px-3 py-1 rounded-full">
        <span id="camStatus" class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span> Camera</span>
        <span id="monitorStatus" class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-500 inline-block"></span> Monitor</span>
      </div>
    </div>

    <!-- video container -->
    <div class="relative bg-gray-800 rounded-2xl overflow-hidden shadow-2xl border border-gray-700" style="aspect-ratio: 4/3;">
      <video id="video" autoplay playsinline muted class="w-full h-full"></video>
      <!-- overlay alarm pulse (invisible by default) -->
      <div id="alarmOverlay" class="absolute inset-0 pointer-events-none transition-all duration-200"></div>
      <!-- center stop alarm button (appears only when alarm rings) -->
      <div id="stopAlarmBtnWrapper" class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <button id="stopAlarmBtn" class="pointer-events-auto bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-2xl text-2xl shadow-2xl transition-all transform scale-95 hover:scale-100 border-2 border-red-400 hidden">
          🚨 STOP ALARM
        </button>
      </div>
    </div>

    <!-- motion activity bar -->
    <div class="relative bg-gray-700 h-6 rounded-full overflow-hidden shadow-inner">
      <div id="motionBarFill" class="h-full bg-gradient-to-r from-green-400 via-yellow-500 to-red-600 rounded-full transition-all duration-100" style="width: 0%;"></div>
      <div id="thresholdLine" class="bar-threshold" style="left: 50%;"></div>
    </div>

    <!-- control grid -->
    <div class="grid grid-cols-2 gap-2">
      <button id="startCamBtn" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 py-2.5 rounded-xl text-sm font-medium transition"><i data-lucide="camera" class="w-4 h-4"></i> Start Camera</button>
      <button id="stopCamBtn" class="flex items-center justify-center gap-2 bg-gray-700 hover:bg-gray-600 py-2.5 rounded-xl text-sm font-medium transition"><i data-lucide="camera-off" class="w-4 h-4"></i> Stop Camera</button>
      <button id="startMonitorBtn" class="flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 py-2.5 rounded-xl text-sm font-medium transition"><i data-lucide="play" class="w-4 h-4"></i> Start Monitoring</button>
      <button id="stopMonitorBtn" class="flex items-center justify-center gap-2 bg-gray-700 hover:bg-gray-600 py-2.5 rounded-xl text-sm font-medium transition"><i data-lucide="square" class="w-4 h-4"></i> Stop Monitoring</button>
    </div>

    <!-- settings -->
    <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 space-y-2">
      <div class="flex items-center justify-between text-sm">
        <span class="flex items-center gap-1"><i data-lucide="sliders" class="w-4 h-4"></i> Sensitivity</span>
        <span id="sensitivityVal" class="bg-gray-700 px-2 py-0.5 rounded-full text-xs">50</span>
      </div>
      <input id="sensitivitySlider" type="range" min="1" max="100" value="50" class="w-full h-1.5 bg-gray-600 rounded-lg appearance-none cursor-pointer">
      <div class="flex items-center justify-between text-sm">
        <span class="flex items-center gap-1"><i data-lucide="volume-2" class="w-4 h-4"></i> Volume</span>
        <span id="volumeVal" class="bg-gray-700 px-2 py-0.5 rounded-full text-xs">0.8</span>
      </div>
      <input id="volumeSlider" type="range" min="0" max="100" value="80" class="w-full h-1.5 bg-gray-600 rounded-lg appearance-none cursor-pointer">
    </div>

    <!-- gallery -->
    <div class="bg-gray-800 p-2 rounded-xl border border-gray-700">
      <div class="flex justify-between items-center mb-1 px-1">
        <span class="text-xs font-medium text-gray-400 flex items-center gap-1"><i data-lucide="images" class="w-4 h-4"></i> Captured</span>
        <span id="galleryCount" class="text-xs text-gray-500">0</span>
      </div>
      <div id="galleryContainer" class="gallery-scroll flex gap-2 overflow-x-auto py-1 px-0.5" style="min-height: 80px;">
        <!-- dynamic images -->
      </div>
    </div>

    <!-- hidden canvas for diff -->
    <canvas id="hiddenCanvas" width="120" height="90" class="hidden"></canvas>
  </div>
  <script>
    (function() {
      // ---- DOM refs ----
      const video = document.getElementById('video');
      const canvas = document.getElementById('hiddenCanvas');
      const ctx = canvas.getContext('2d');

      const startCamBtn = document.getElementById('startCamBtn');
      const stopCamBtn = document.getElementById('stopCamBtn');
      const startMonitorBtn = document.getElementById('startMonitorBtn');
      const stopMonitorBtn = document.getElementById('stopMonitorBtn');
      const stopAlarmBtn = document.getElementById('stopAlarmBtn');
      const stopAlarmWrapper = document.getElementById('stopAlarmBtnWrapper');

      const motionBarFill = document.getElementById('motionBarFill');
      const thresholdLine = document.getElementById('thresholdLine');
      const alarmOverlay = document.getElementById('alarmOverlay');
      const galleryContainer = document.getElementById('galleryContainer');
      const galleryCount = document.getElementById('galleryCount');

      const sensitivitySlider = document.getElementById('sensitivitySlider');
      const volumeSlider = document.getElementById('volumeSlider');
      const sensitivityVal = document.getElementById('sensitivityVal');
      const volumeVal = document.getElementById('volumeVal');

      // status dots
      const camStatusDot = document.querySelector('#camStatus .w-2');
      const monitorStatusDot = document.querySelector('#monitorStatus .w-2');

      // ---- state ----
      let stream = null;
      let isCameraOn = false;
      let isMonitoring = false;
      let alarmActive = false;
      let motionScore = 0;

      // audio context & nodes
      let audioCtx = null;
      let oscillator = null;
      let gainNode = null;
      let alarmInterval = null;

      // frame diff
      let previousFrameData = null;
      let animationFrameId = null;

      // sensitivity threshold (0..1) from slider 1..100 -> map to 0.01..0.4
      let sensitivity = 0.15; // default 50 -> 0.15
      let volume = 0.8;

      // gallery store
      let galleryItems = [];

      // ---- helpers ----
      function updateStatusDots() {
        camStatusDot.className = `w-2 h-2 rounded-full inline-block ${isCameraOn ? 'bg-green-400' : 'bg-gray-500'}`;
        monitorStatusDot.className = `w-2 h-2 rounded-full inline-block ${isMonitoring ? 'bg-yellow-400' : 'bg-gray-500'}`;
      }

      // ---- camera ----
      async function startCamera() {
        if (isCameraOn) return;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          isCameraOn = true;
          updateStatusDots();
        } catch (err) {
          alert('Camera access denied or not available: ' + err.message);
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        video.srcObject = null;
        isCameraOn = false;
        updateStatusDots();
        // if monitoring, stop it
        if (isMonitoring) stopMonitoring();
        // clear any frame loop
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
        previousFrameData = null;
        motionBarFill.style.width = '0%';
        motionScore = 0;
      }

      // ---- motion detection (diff) ----
      function computeAverageDiff(data1, data2) {
        let totalDiff = 0;
        const len = data1.length;
        for (let i = 0; i < len; i += 4) {
          const r = Math.abs(data1[i] - data2[i]);
          const g = Math.abs(data1[i+1] - data2[i+1]);
          const b = Math.abs(data1[i+2] - data2[i+2]);
          totalDiff += (r + g + b) / 3; // average per pixel
        }
        return totalDiff / (len / 4); // average over all pixels
      }

      function captureFrame() {
        if (!isCameraOn || !video.videoWidth) return null;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return ctx.getImageData(0, 0, canvas.width, canvas.height);
      }

      // ---- alarm ----
      function startAlarm() {
        if (alarmActive) return;
        alarmActive = true;
        // show stop button
        stopAlarmBtn.classList.remove('hidden');
        stopAlarmWrapper.classList.remove('pointer-events-none');
        stopAlarmWrapper.classList.add('pointer-events-auto');

        // pulse red overlay
        alarmOverlay.classList.add('pulse-red');
        // we keep pulsing via interval
        if (alarmInterval) clearInterval(alarmInterval);
        alarmInterval = setInterval(() => {
          alarmOverlay.classList.remove('pulse-red');
          void alarmOverlay.offsetWidth; // reflow
          alarmOverlay.classList.add('pulse-red');
        }, 500);

        // audio context
        try {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
          // create oscillator & gain
          oscillator = audioCtx.createOscillator();
          gainNode = audioCtx.createGain();
          gainNode.gain.value = volume;
          oscillator.type = 'sawtooth';
          oscillator.frequency.value = 400;
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.start();

          // siren effect: alternate frequency
          let toggle = true;
          if (alarmInterval) clearInterval(alarmInterval);
          const sirenInterval = setInterval(() => {
            if (!alarmActive || !oscillator) {
              clearInterval(sirenInterval);
              return;
            }
            oscillator.frequency.value = toggle ? 600 : 800;
            toggle = !toggle;
          }, 200);
          // store interval for cleanup
          alarmInterval = sirenInterval;
        } catch (e) {
          console.warn('Audio alarm error:', e);
        }
      }

      function stopAlarm(closeCtx = true) {
        alarmActive = false;
        stopAlarmBtn.classList.add('hidden');
        stopAlarmWrapper.classList.add('pointer-events-none');
        stopAlarmWrapper.classList.remove('pointer-events-auto');
        alarmOverlay.classList.remove('pulse-red');
        if (alarmInterval) {
          clearInterval(alarmInterval);
          alarmInterval = null;
        }
        if (oscillator) {
          try { oscillator.stop(); oscillator.disconnect(); } catch(e) {}
          oscillator = null;
        }
        if (gainNode) {
          try { gainNode.disconnect(); } catch(e) {}
          gainNode = null;
        }
        if (closeCtx && audioCtx) {
          try { audioCtx.close(); } catch(e) {}
          audioCtx = null;
        }
      }

      // ---- capture photo ----
      function capturePhoto() {
        if (!isCameraOn || !video.videoWidth) return;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.92);
        const timestamp = new Date().toLocaleTimeString();
        addGalleryItem(dataUrl, timestamp);
      }

      function addGalleryItem(dataUrl, timestamp) {
        const item = { dataUrl, timestamp };
        galleryItems.push(item);
        renderGallery();
      }

      function renderGallery() {
        galleryContainer.innerHTML = '';
        galleryItems.forEach((item, index) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'flex-shrink-0 w-24 rounded-lg overflow-hidden border border-gray-600 bg-gray-900 relative group';
          wrapper.innerHTML = `
            <img src="${item.dataUrl}" class="w-24 h-16 object-cover" alt="motion capture">
            <div class="text-[10px] text-gray-400 text-center bg-gray-800/80 py-0.5">${item.timestamp}</div>
            <div class="absolute bottom-5 left-0 right-0 flex justify-center gap-1 p-1 bg-black/40 backdrop-blur-sm">
              <button class="download-btn text-xs bg-blue-500 hover:bg-blue-600 px-1.5 py-0.5 rounded text-white flex items-center gap-0.5" data-index="${index}"><i data-lucide="download" class="w-3 h-3"></i></button>
              <button class="delete-btn text-xs bg-red-500 hover:bg-red-600 px-1.5 py-0.5 rounded text-white flex items-center gap-0.5" data-index="${index}"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
            </div>
          `;
          galleryContainer.appendChild(wrapper);
          // bind events
          wrapper.querySelector('.download-btn').addEventListener('click', (e) => {
            const idx = parseInt(e.currentTarget.dataset.index);
            downloadImage(idx);
          });
          wrapper.querySelector('.delete-btn').addEventListener('click', (e) => {
            const idx = parseInt(e.currentTarget.dataset.index);
            deleteImage(idx);
          });
        });
        galleryCount.textContent = galleryItems.length;
        // re-init lucide icons
        lucide.createIcons();
        // if gallery empty, show placeholder
        if (galleryItems.length === 0) {
          galleryContainer.innerHTML = `<div class="text-gray-500 text-xs flex items-center justify-center w-full h-16">No captures yet</div>`;
        }
      }

      function downloadImage(index) {
        const item = galleryItems[index];
        if (!item) return;
        const a = document.createElement('a');
        a.href = item.dataUrl;
        a.download = `security_capture_${Date.now()}.jpg`;
        a.click();
      }

      function deleteImage(index) {
        galleryItems.splice(index, 1);
        renderGallery();
      }

      // ---- monitoring loop ----
      function startMonitoring() {
        if (!isCameraOn) {
          alert('Please start the camera first.');
          return;
        }
        if (isMonitoring) return;
        // resume audio context on user gesture
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        } else if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        isMonitoring = true;
        updateStatusDots();
        previousFrameData = null;
        motionScore = 0;
        // stop any previous alarm
        stopAlarm(false);

        function frameLoop() {
          if (!isMonitoring || !isCameraOn) {
            animationFrameId = null;
            return;
          }
          const frame = captureFrame();
          if (frame) {
            const currentData = frame.data;
            if (previousFrameData) {
              const diff = computeAverageDiff(previousFrameData, currentData);
              // diff range 0..255 (average per pixel)
              motionScore = Math.min(1, diff / 80); // normalize
              const barWidth = Math.min(100, motionScore * 100);
              motionBarFill.style.width = barWidth + '%';

              // check threshold
              const threshold = sensitivity; // 0..1
              thresholdLine.style.left = (threshold * 100) + '%';
              if (motionScore > threshold && !alarmActive) {
                // capture photo before alarm
                capturePhoto();
                startAlarm();
              } else if (motionScore <= threshold && alarmActive) {
                // auto stop alarm if motion goes below threshold? we keep it manual.
                // but we don't auto-stop, user must press stop.
              }
            }
            previousFrameData = new Uint8ClampedArray(currentData);
          }
          animationFrameId = requestAnimationFrame(frameLoop);
        }
        frameLoop();
      }

      function stopMonitoring() {
        isMonitoring = false;
        updateStatusDots();
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
        previousFrameData = null;
        motionBarFill.style.width = '0%';
        motionScore = 0;
        // stop alarm if active
        if (alarmActive) stopAlarm(true);
      }

      // ---- event bindings ----
      startCamBtn.addEventListener('click', startCamera);
      stopCamBtn.addEventListener('click', stopCamera);
      startMonitorBtn.addEventListener('click', startMonitoring);
      stopMonitorBtn.addEventListener('click', stopMonitoring);
      stopAlarmBtn.addEventListener('click', () => stopAlarm(true));

      // sensitivity
      sensitivitySlider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        sensitivityVal.textContent = val;
        sensitivity = val / 100 * 0.4 + 0.01; // map 1..100 to 0.01..0.41
        thresholdLine.style.left = (sensitivity * 100) + '%';
      });
      // volume
      volumeSlider.addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        volumeVal.textContent = (val / 100).toFixed(1);
        volume = val / 100;
        if (gainNode) gainNode.gain.value = volume;
      });

      // init threshold line
      thresholdLine.style.left = '15%';
      // init icons
      lucide.createIcons();

      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        stopCamera();
        stopMonitoring();
        stopAlarm(true);
        if (audioCtx) { try { audioCtx.close(); } catch(e) {} }
      });
    })();
  </script>
</body>
</html>
